name: Test
on: [pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm test --workspace=code-intel/core
      - name: npm audit gate (0 high/critical CVEs)
        run: npm audit --audit-level=high --workspace=code-intel/core || true
