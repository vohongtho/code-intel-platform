name: Test
on: [pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps --ignore-scripts
      - name: Rebuild native modules needed for tests
        run: npm rebuild @ladybugdb/core better-sqlite3 --legacy-peer-deps
      - run: npm test --workspace=code-intel/core
      - name: npm audit gate (0 high/critical CVEs)
        run: npm audit --audit-level=high --omit=dev
