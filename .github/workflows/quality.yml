name: Quality
on: [pull_request]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx tsc -b code-intel/shared code-intel/core
      - run: npx tsc -b code-intel/web
